format:
  html:
    theme:
      light: [cosmo, custom-light.scss]
      dark: [cosmo, custom-dark.scss]
    css: styles.css
    toc: false
    anchor-sections: true
    smooth-scroll: true
    code-copy: true
    code-overflow: wrap
    highlight-style: github
    html-math-method: katex
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
          <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    include-after-body:
      - text: |
          <script>
          document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('js-ready');
            
            document.querySelectorAll('.project-card, .animate-in, .reveal').forEach(el => {
              el.classList.add('animate');
            });
            
            const observer = new IntersectionObserver((entries) => {
              entries.forEach(entry => {
                if (entry.isIntersecting) {
                  entry.target.classList.add('visible');
                }
              });
            }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
            
            document.querySelectorAll('.reveal, .animate-in').forEach(el => observer.observe(el));
            
            document.querySelectorAll('.gallery-item img, .lightbox-trigger').forEach(img => {
              img.style.cursor = 'pointer';
              img.addEventListener('click', function() {
                const lightbox = document.createElement('div');
                lightbox.className = 'lightbox-overlay';
                lightbox.innerHTML = '<div class="lightbox-content"><img src="' + this.src + '" alt="' + (this.alt || '') + '"><button class="lightbox-close" aria-label="Close">&times;</button></div>';
                document.body.appendChild(lightbox);
                document.body.style.overflow = 'hidden';
                requestAnimationFrame(() => lightbox.classList.add('active'));
                const close = () => {
                  lightbox.classList.remove('active');
                  setTimeout(() => { lightbox.remove(); document.body.style.overflow = ''; }, 300);
                };
                lightbox.querySelector('.lightbox-close').addEventListener('click', close);
                lightbox.addEventListener('click', (e) => { if (e.target === lightbox) close(); });
                document.addEventListener('keydown', function esc(e) { if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); } });
              });
            });
          });
          </script>

execute:
  freeze: auto